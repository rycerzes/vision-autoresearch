# Base config for image classification
# Experiments modify this file; training scripts are stable infrastructure.

task_type: classify
backend: transformers

# Model loading (shared HF vision runner)
model_loader: auto_task_head
model_name_or_path: google/vit-base-patch16-224

# Adaptation: full_finetune | freeze_backbone | linear_probe | feature_extract_eval | zero_shot_eval | prompt_or_class_adapter
adaptation_mode: full_finetune

# Dataset (must be on HF Hub)
dataset_name: food101

# Training
num_train_epochs: 10
per_device_train_batch_size: 32
per_device_eval_batch_size: 32
learning_rate: 1.0e-4
weight_decay: 0.01
warmup_steps: 0.1
lr_scheduler_type: cosine
gradient_accumulation_steps: 1
fp16: true
dataloader_num_workers: 4
do_train: true
do_eval: true
remove_unused_columns: false

# Augmentation
use_trivial_augment: true

# Evaluation
eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: eval_accuracy

# Promotion (submit_patch ledger / local master)
promotion:
  primary: accuracy
  direction: higher
  min_delta: 0.0

# Hub
push_to_hub: false
