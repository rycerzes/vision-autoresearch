# Ultralytics YOLO classification
task_type: classify_yolo
backend: ultralytics

model_name_or_path: yolo26n-cls.pt

dataset_name: ethz/food101
dataset_config_name: null

label_column: label
train_val_split: 0.1
image_square_size: 224
max_train_samples: null
max_eval_samples: null

# Ultralytics.train kwargs: https://docs.ultralytics.com/modes/train/
ultralytics_train: {}

num_train_epochs: 10
per_device_train_batch_size: 16
learning_rate: 5.0e-4
weight_decay: 0.05
warmup_steps: 0
lr_scheduler_type: cosine
gradient_accumulation_steps: 1
fp16: true
dataloader_num_workers: 4
do_train: true
do_eval: true
seed: 42

eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: false
greater_is_better: true

promotion:
  primary: accuracy
  direction: higher
  min_delta: 0.0

push_to_hub: false
output_dir: ./outputs/classify_yolo
run_name: classify_yolo-run
