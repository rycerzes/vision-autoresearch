# Base config for Ultralytics YOLO object detection
# Experiments modify this file; training scripts are stable infrastructure.

task_type: detect_yolo
backend: ultralytics

# Model (Ultralytics checkpoint name or path, e.g. yolo26n.pt, yolov8s-world.pt, yoloe-26s-seg.pt, rtdetr-l.pt)
model_name_or_path: yolo26n.pt

# Optional: bridge for YOLO-World / YOLOE / RT-DETR / trainer overrides (see train_ultralytics.py docstring).
# ultralytics_bridge:
#   model_class: auto   # auto | yolo | yoloe | yolo_world | rtdetr
#   yoloe_training: full   # auto | full | linear_probe (maps to YOLOE* vs YOLOEPE* trainers)
#   yoloe_pretrained_weights: null   # optional path for .train(pretrained=...) when using YAML+weights flows
#   trainer: null   # optional trainer class name; overrides yoloe_training when set
#   sync_class_names: true   # YOLO-World / YOLOE: call set_classes from dataset names

# Dataset (HF Hub — same detection schema as task `detect`)
dataset_name: cppe-5
train_split: train
eval_split: test

# Ultralytics.train kwargs: https://docs.ultralytics.com/modes/train/
ultralytics_train: {}

num_train_epochs: 20
per_device_train_batch_size: 8
learning_rate: 5.0e-5
weight_decay: 0.01
warmup_steps: 0
lr_scheduler_type: cosine
gradient_accumulation_steps: 1
fp16: true
dataloader_num_workers: 4
do_train: true
do_eval: true
seed: 42

# YOLO / data
image_square_size: 640
max_train_samples: null
max_eval_samples: null

# Evaluation / checkpointing (unused by Ultralytics trainer; kept for YAML parity)
eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: false
metric_for_best_model: map50
greater_is_better: true

# Promotion metric (parsed from summary as mAP)
promotion_metric: mAP

# Hub
push_to_hub: false
output_dir: ./outputs/detect_yolo
run_name: detect_yolo-run
