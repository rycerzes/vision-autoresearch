# Ultralytics YOLO oriented boxes (bbox as 5 floats cx,cy,w,h,theta or 8 corner coords per instance)
task_type: obb_yolo
backend: ultralytics

model_name_or_path: yolo26n-obb.pt

# cppe-5 passes prepare.py but uses axis-aligned 4-value boxes; obb_yolo needs 5 or 8
# values per instance — swap dataset_name before training.
dataset_name: cppe-5
dataset_config_name: null

train_val_split: 0.15
image_square_size: 640
max_train_samples: null
max_eval_samples: null

# Ultralytics.train kwargs: https://docs.ultralytics.com/modes/train/
ultralytics_train: {}

num_train_epochs: 10
per_device_train_batch_size: 8
learning_rate: 5.0e-5
weight_decay: 0.01
warmup_steps: 0
lr_scheduler_type: cosine
gradient_accumulation_steps: 1
fp16: true
dataloader_num_workers: 4
do_train: true
do_eval: true
seed: 42

eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: false
greater_is_better: true

promotion_metric: mAP

push_to_hub: false
output_dir: ./outputs/obb_yolo
run_name: obb_yolo-run
