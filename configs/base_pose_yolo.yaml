# Ultralytics YOLO pose (requires objects.keypoints per instance; COCO-style [x,y,v] triplets)
task_type: pose_yolo
backend: ultralytics

model_name_or_path: yolo26n-pose.pt

# cppe-5 passes prepare.py (detection schema) but has no keypoints; replace with a
# COCO-pose-style HF dataset before training or export will fail at runtime.
dataset_name: cppe-5
dataset_config_name: null

train_val_split: 0.15
image_square_size: 640
max_train_samples: null
max_eval_samples: null

# Ultralytics.train kwargs: https://docs.ultralytics.com/modes/train/
ultralytics_train: {}

num_train_epochs: 10
per_device_train_batch_size: 8
learning_rate: 5.0e-5
weight_decay: 0.01
warmup_steps: 0
lr_scheduler_type: cosine
gradient_accumulation_steps: 1
fp16: true
dataloader_num_workers: 4
do_train: true
do_eval: true
seed: 42

eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: false
greater_is_better: true

promotion_metric: mAP

push_to_hub: false
output_dir: ./outputs/pose_yolo
run_name: pose_yolo-run
