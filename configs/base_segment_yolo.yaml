# Ultralytics YOLO segmentation (semantic mask → polygon labels)
task_type: segment_yolo
backend: ultralytics

model_name_or_path: yolo26n-seg.pt

# HF semantic/instance-style masks (see prepare.py segment schema).
# Public default: PNG masks in `label` column (train + validation splits).
dataset_name: EduardoPacheco/FoodSeg103
dataset_config_name: null

train_val_split: 0.1
image_square_size: 640
mask_column: null
max_train_samples: null
max_eval_samples: null

# Ultralytics.train kwargs: https://docs.ultralytics.com/modes/train/
ultralytics_train: {}

num_train_epochs: 10
per_device_train_batch_size: 4
learning_rate: 5.0e-5
weight_decay: 0.01
warmup_steps: 0
lr_scheduler_type: cosine
gradient_accumulation_steps: 1
fp16: true
dataloader_num_workers: 4
do_train: true
do_eval: true
seed: 42

eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: false
metric_for_best_model: map50
greater_is_better: true

promotion_metric: iou

push_to_hub: false
output_dir: ./outputs/segment_yolo
run_name: segment_yolo-run
