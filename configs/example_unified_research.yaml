# Unified config: Research mode with modification.py
# Usage: uv run train_vision.py configs/example_unified_research.yaml
#
# Edit experiments/modification.py to define architecture changes,
# custom loss, freeze strategy, etc.

model_name_or_path: ustc-community/dfine-small-coco
dataset_name: cppe-5

# Universal training args
num_train_epochs: 20
per_device_train_batch_size: 8
learning_rate: 1.0e-4
weight_decay: 0.01
image_size: 640
fp16: true
seed: 42

# Research mode: load modification module
modification_module: experiments/modification.py

# Evaluation
eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: true

# LR scheduler
lr_scheduler_type: cosine

# Output
output_dir: ./output/research-dfine-cppe5

# Promotion
promotion_metric: mAP
promotion_direction: higher
